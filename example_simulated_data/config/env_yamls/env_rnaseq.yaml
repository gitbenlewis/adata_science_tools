name: rnaseq
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - scanpy=1.9.6
  - anndata=0.9.2
  - "numpy>=1.23,<2.0"
  - "pandas<2.0"
  - "numba>=0.57,<0.60"
  - "scipy<1.13"
  - python-igraph
  - leidenalg
  - gseapy
  - matplotlib-base
  - seaborn
  - scikit-learn
  - statsmodels
  - h5py
  - zarr
  - lxml
  - networkx
  - ipykernel
  - ipython>=8.0
  - pyyaml
  - tqdm
  - yq
prefix: /home/ubuntu/miniconda3/envs/rnaseq
