make_diff_test_tables_params:
  repo_results_dir: /home/ubuntu/projects/gitbenlewis/general_dataset_template_private/Repo_example_PMID_33969320/results/diff_test/
  default_params:
    layer: 
    ascending: true
    groupby_key: 
    save_output: true
    add_adata_var_column_key_list: ['OlinkID','Assay','UniProt','Panel','Panel_Version','Protein target','Short name','gene_name']
    add_values2results: true
    use_raw: false
  diff_test_runs:
    COVID_over_NOT_D0:
      run: true
      adata_path:  /home/ubuntu/projects/gitbenlewis/general_dataset_template_private/Repo_example_PMID_33969320/results/datasets/example_dataset_PMID_33969320/D0/olink_PMID_33969320.D0.h5ad
      comparison_col_tag: _COVID_over_NOT_D0
      groupby_key: COVID
      groupby_key_target_values:
        - '1'
      groupby_key_ref_values:
        - '0'
      tests:
        - ttest_ind
        - mannwhitneyu
      sortby: ttest_ind_pvals_COVID_over_NOT_D0
      save_path: /home/ubuntu/projects/gitbenlewis/general_dataset_template_private/Repo_example_PMID_33969320/results/diff_test/diff_test_COVID_over_NOT_D0.csv
